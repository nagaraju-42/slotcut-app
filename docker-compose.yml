version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: slotcut-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slotcut
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./slotcut-backend
    container_name: slotcut-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: slotcut
      DB_USER: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: slotcut-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
